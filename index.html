<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Geri Sayım ❤️</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background:#000;
      color:white;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .container{
      text-align:center;
      padding:20px;
    }

    h1{
      font-size:2.5rem;
      margin-bottom:40px;
      color:#ff4d6d;
    }

    .countdown{
      display:flex;
      gap:20px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .box{
      background:#111;
      padding:25px;
      border-radius:20px;
      min-width:120px;
      box-shadow:0 0 20px rgba(255,255,255,0.08);
    }

    .number{
      font-size:3rem;
      font-weight:bold;
      color:#fff;
    }

    .label{
      margin-top:10px;
      font-size:1rem;
      color:#aaa;
      letter-spacing:1px;
    }

    .heart{
      margin-top:40px;
      font-size:1.5rem;
      color:#ff4d6d;
      animation:pulse 1.5s infinite;
    }

    @keyframes pulse{
      0%{transform:scale(1);}
      50%{transform:scale(1.1);}
      100%{transform:scale(1);}
    }

    @media (max-width: 768px){
      h1{
        font-size:1.8rem;
      }

      .number{
        font-size:2.2rem;
      }

      .box{
        min-width:100px;
        padding:20px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Aşkıma Kavuşmama Kalan Süre ❤️</h1>

    <div class="countdown">
      <div class="box">
        <div class="number" id="days">0</div>
        <div class="label">Gün</div>
      </div>

      <div class="box">
        <div class="number" id="hours">0</div>
        <div class="label">Saat</div>
      </div>

      <div class="box">
        <div class="number" id="minutes">0</div>
        <div class="label">Dakika</div>
      </div>

      <div class="box">
        <div class="number" id="seconds">0</div>
        <div class="label">Saniye</div>
      </div>
    </div>

    <div class="heart">❤️ Seni Bekliyorum ❤️</div>
  </div>

  <script>
    const targetDate = new Date("2026-05-31T17:00:00").getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance <= 0) {
        document.querySelector(".container").innerHTML = `
          <h1>❤️ Kavuşma Zamanı ❤️</h1>
        `;
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("days").innerText = days;
      document.getElementById("hours").innerText = hours;
      document.getElementById("minutes").innerText = minutes;
      document.getElementById("seconds").innerText = seconds;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>

</body>
</html>
